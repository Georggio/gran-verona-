<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edificio Gran Verona — Dashboard de Obra</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f0; color: #1a1a1a; }

  .header {
    background: #fff;
    padding: 1.25rem 1rem 0.875rem;
    border-bottom: 1px solid #e5e5e5;
    position: sticky; top: 0; z-index: 5;
  }
  .header-eyebrow { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: #999; margin-bottom: 3px; }
  .header-title { font-size: 19px; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
  .header-floor { font-size: 13px; color: #666; margin-top: 2px; }
  .header-sync { font-size: 11px; color: #aaa; margin-top: 4px; }

  .floor-nav {
    background: #fff;
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 1rem;
    border-bottom: 1px solid #e5e5e5;
    scrollbar-width: none;
  }
  .floor-nav::-webkit-scrollbar { display: none; }
  .floor-pill {
    font-size: 11px; padding: 5px 12px; border-radius: 999px;
    border: 1px solid #ddd; background: #fff; color: #666;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    text-decoration: none;
  }
  .floor-pill.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; font-weight: 500; }

  .main { padding: 1rem; max-width: 480px; margin: 0 auto; }

  .legend {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
    padding: 10px 12px; background: #fff; border-radius: 12px;
    margin-bottom: 1rem; border: 1px solid #e5e5e5;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 11px; color: #666; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-0 { background: #aaa; }
  .dot-1 { background: #EF9F27; }
  .dot-2 { background: #378ADD; }
  .dot-3 { background: #639922; }

  .section-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #aaa; margin: 1rem 0 8px; }

  .area-card {
    background: #fff; border: 1px solid #e5e5e5; border-radius: 12px;
    padding: 0.75rem 1rem; margin-bottom: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
  }
  .area-card:hover { border-color: #bbb; }
  .area-card-name { font-size: 14px; font-weight: 500; flex: 1; }
  .area-card-arrow { font-size: 11px; color: #aaa; }

  .dept-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-bottom: 1rem; }
  .dept-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 0.75rem; cursor: pointer; }
  .dept-card:hover { border-color: #bbb; }
  .dept-card-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .dept-rubros { display: flex; flex-direction: column; gap: 5px; }
  .dept-rubro-row { display: flex; align-items: center; gap: 6px; }
  .dept-rubro-name { font-size: 11px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Detail overlay */
  .detail-overlay {
    display: none; position: fixed; inset: 0; background: #fff;
    z-index: 20; overflow-y: auto; padding: 1rem;
  }
  .detail-overlay.open { display: block; }
  .back-btn {
    display: flex; align-items: center; gap: 6px; font-size: 13px;
    color: #666; cursor: pointer; margin-bottom: 1rem; padding: 4px 0;
    border: none; background: none;
  }
  .back-btn:hover { color: #1a1a1a; }
  .detail-title { font-size: 17px; font-weight: 600; margin-bottom: 2px; }
  .detail-subtitle { font-size: 12px; color: #888; margin-bottom: 1.25rem; }

  .rubro-block { margin-bottom: 1.25rem; }
  .rubro-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.06em; color: #888;
    padding-bottom: 6px; border-bottom: 1px solid #eee; margin-bottom: 2px;
  }
  .task-row {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0; border-bottom: 1px solid #f0f0f0;
  }
  .task-row:last-child { border-bottom: none; }
  .task-name { flex: 1; font-size: 13px; line-height: 1.4; }
  .task-badge { font-size: 10px; padding: 3px 9px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
  .badge-0 { background: #E9ECEF; color: #495057; }
  .badge-1 { background: #FFF3CD; color: #856404; }
  .badge-2 { background: #CCE5FF; color: #004085; }
  .badge-3 { background: #D4EDDA; color: #155724; }

  .loading-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 3rem 1rem; gap: 12px; color: #888; font-size: 14px;
  }
  .spinner {
    width: 24px; height: 24px; border: 2px solid #ddd;
    border-top-color: #888; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-state {
    margin: 1rem; padding: 1rem; background: #fff8f0;
    border-radius: 12px; border: 1px solid #f0c080;
    font-size: 13px; color: #555; line-height: 1.6;
  }
  .error-state strong { color: #333; }

  /* NAV: hidden when ?piso= param is present */
  body.single-floor .floor-nav { display: none; }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-eyebrow">Dashboard de obra</div>
    <div class="header-title">Edificio Gran Verona</div>
    <div class="header-floor" id="header-floor">—</div>
    <div class="header-sync" id="header-sync">Cargando datos...</div>
  </div>
  <div class="floor-nav" id="floor-nav"></div>
  <div id="main-content">
    <div class="loading-state"><div class="spinner"></div>Conectando con Google Sheets...</div>
  </div>
</div>

<div class="detail-overlay" id="detail-overlay">
  <button class="back-btn" onclick="closeDetail()">&#8592; Volver</button>
  <div class="detail-title" id="detail-title"></div>
  <div class="detail-subtitle" id="detail-subtitle"></div>
  <div id="detail-content"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// CONFIGURACIÓN
// ─────────────────────────────────────────────────────────────────────────────
const SHEET_ID = "1sSSKaxSSfakE8b5LJPW0YPNtbjO4Lpr7IkzFqycEAt0";

const FLOORS = [
  { id:"subsuelo", label:"Subsuelo",    type:"special", areas:["Cocheras","Núcleo de escaleras","Hall"] },
  { id:"pb",       label:"Planta Baja", type:"special", areas:["Local 1","Local 2","Local 3","Núcleo de escaleras","Hall"] },
  { id:"entre",    label:"Entrepiso",   type:"special", areas:["Local 1","Local 2","Núcleo de escaleras","Hall"] },
  { id:"p1",  label:"Piso 1",  type:"depto", depts:7 },
  { id:"p2",  label:"Piso 2",  type:"depto", depts:7 },
  { id:"p3",  label:"Piso 3",  type:"depto", depts:7 },
  { id:"p4",  label:"Piso 4",  type:"depto", depts:7 },
  { id:"p5",  label:"Piso 5",  type:"depto", depts:7 },
  { id:"p6",  label:"Piso 6",  type:"depto", depts:7 },
  { id:"p7",  label:"Piso 7",  type:"depto", depts:7 },
  { id:"p8",  label:"Piso 8",  type:"depto", depts:7 },
  { id:"p9",  label:"Piso 9",  type:"depto", depts:7 },
  { id:"terraza", label:"Terraza", type:"special", areas:["Quincho","Parrilleros","Pileta","Solarium","Núcleo de escaleras"] }
];

const STATUS_LABELS = [
  "Se comenzará pronto",
  "En ejecución",
  "Finalizado parcialmente",
  "Finalizado y aprobado"
];
const STATUS_DOTS   = ["dot-0","dot-1","dot-2","dot-3"];
const STATUS_BADGES = ["badge-0","badge-1","badge-2","badge-3"];

// ─────────────────────────────────────────────────────────────────────────────
// URL PARAM: ?piso=p3
// Si está presente → modo piso único (sin nav). Si no → modo completo con nav.
// ─────────────────────────────────────────────────────────────────────────────
const params      = new URLSearchParams(window.location.search);
const pisoParam   = params.get("piso");
const singleFloor = pisoParam && FLOORS.find(f => f.id === pisoParam);

let currentFloorId = singleFloor ? pisoParam : "p1";
if (singleFloor) document.body.classList.add("single-floor");

let rubros    = [];
let sheetData = {};

// ─────────────────────────────────────────────────────────────────────────────
// FETCH
// ─────────────────────────────────────────────────────────────────────────────
async function fetchSheet(sheetName) {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} al cargar hoja "${sheetName}"`);
  const text = await res.text();
  const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!match) throw new Error(`Respuesta inesperada de Google Sheets. ¿La hoja está publicada como pública?`);
  const json = JSON.parse(match[1]);
  return (json.table.rows || []).map(r => (r.c || []).map(c => c ? String(c.v ?? "") : ""));
}

async function loadConfig() {
  const rows = await fetchSheet("config");
  const map = {}, order = [];
  for (const row of rows) {
    const rid   = row[0]?.trim();
    const rname = row[1]?.trim();
    const item  = row[2]?.trim();
    if (!rid || !rname || !item) continue;
    if (!map[rid]) { map[rid] = { id:rid, name:rname, items:[] }; order.push(rid); }
    map[rid].items.push(item);
  }
  return order.map(id => map[id]);
}

async function loadFloorData(floorId) {
  const rows = await fetchSheet(floorId);
  const map  = {};
  for (const row of rows) {
    const area   = row[1]?.trim();
    const rubro  = row[2]?.trim();
    const item   = row[3]?.trim();
    const status = row[4]?.trim();
    if (!area || !item) continue;
    const idx = STATUS_LABELS.indexOf(status);
    map[`${area}||${rubro}||${item}`] = idx >= 0 ? idx : 0;
  }
  return map;
}

function getStatus(area, rubroName, item) {
  return sheetData[`${area}||${rubroName}||${item}`] ?? 0;
}

function dominantStatus(area) {
  let best = 0;
  rubros.forEach(r => r.items.forEach(it => {
    const s = getStatus(area, r.name, it);
    if (s > best) best = s;
  }));
  return best;
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function renderFloor() {
  const floor  = FLOORS.find(f => f.id === currentFloorId);
  document.getElementById("header-floor").textContent = floor.label;

  const areas = floor.type === "depto"
    ? ["Hall del piso","Núcleo de escaleras", ...Array.from({length:floor.depts}, (_,i) => `Depto ${i+1}`)]
    : floor.areas;

  let html = `<div class="main">`;

  html += `<div class="legend">`;
  STATUS_LABELS.forEach((l,i) => {
    html += `<div class="legend-item"><span class="status-dot ${STATUS_DOTS[i]}"></span><span>${l}</span></div>`;
  });
  html += `</div>`;

  if (floor.type === "depto") {
    html += `<div class="section-label">Áreas comunes</div>`;
    ["Hall del piso","Núcleo de escaleras"].forEach(area => {
      const st = dominantStatus(area);
      html += `<div class="area-card" onclick="openDetail('${area}')">
        <span class="status-dot ${STATUS_DOTS[st]}"></span>
        <span class="area-card-name">${area}</span>
        <span class="area-card-arrow">Ver detalle ›</span>
      </div>`;
    });
    html += `<div class="section-label">Departamentos</div><div class="dept-grid">`;
    for (let d = 1; d <= floor.depts; d++) {
      const area = `Depto ${d}`;
      html += `<div class="dept-card" onclick="openDetail('${area.replace(/'/g,"\\'")}')">
        <div class="dept-card-title">${area}</div>
        <div class="dept-rubros">`;
      rubros.forEach(r => {
        const st = getStatus(area, r.name, r.items[0]);
        html += `<div class="dept-rubro-row">
          <span class="status-dot ${STATUS_DOTS[st]}"></span>
          <span class="dept-rubro-name">${r.name}</span>
        </div>`;
      });
      html += `</div></div>`;
    }
    html += `</div>`;
  } else {
    html += `<div class="section-label">Áreas</div>`;
    areas.forEach(area => {
      const st = dominantStatus(area);
      html += `<div class="area-card" onclick="openDetail('${area.replace(/'/g,"\\'")}')">
        <span class="status-dot ${STATUS_DOTS[st]}"></span>
        <span class="area-card-name">${area}</span>
        <span class="area-card-arrow">Ver detalle ›</span>
      </div>`;
    });
  }

  html += `</div>`;
  document.getElementById("main-content").innerHTML = html;
}

function openDetail(area) {
  const floor = FLOORS.find(f => f.id === currentFloorId);
  document.getElementById("detail-title").textContent    = area;
  document.getElementById("detail-subtitle").textContent = `${floor.label} · Edificio Gran Verona`;
  let html = "";
  rubros.forEach(r => {
    html += `<div class="rubro-block"><div class="rubro-title">${r.name}</div>`;
    r.items.forEach(item => {
      const st = getStatus(area, r.name, item);
      html += `<div class="task-row">
        <span class="status-dot ${STATUS_DOTS[st]}"></span>
        <span class="task-name">${item}</span>
        <span class="task-badge ${STATUS_BADGES[st]}">${STATUS_LABELS[st]}</span>
      </div>`;
    });
    html += `</div>`;
  });
  document.getElementById("detail-content").innerHTML = html;
  document.getElementById("detail-overlay").classList.add("open");
  window.scrollTo(0,0);
}

function closeDetail() {
  document.getElementById("detail-overlay").classList.remove("open");
}

// ─────────────────────────────────────────────────────────────────────────────
// NAV (solo en modo completo)
// ─────────────────────────────────────────────────────────────────────────────
function buildNav() {
  if (singleFloor) return;
  const nav = document.getElementById("floor-nav");
  nav.innerHTML = FLOORS.map(f =>
    `<div class="floor-pill ${f.id===currentFloorId?"active":""}" onclick="switchFloor('${f.id}')">${f.label}</div>`
  ).join("");
}

async function switchFloor(id) {
  currentFloorId = id;
  buildNav();
  await loadAndRender();
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
async function loadAndRender() {
  document.getElementById("main-content").innerHTML =
    `<div class="loading-state"><div class="spinner"></div>Cargando datos...</div>`;
  try {
    if (rubros.length === 0) rubros = await loadConfig();
    sheetData = await loadFloorData(currentFloorId);
    renderFloor();
    const now = new Date().toLocaleString("es-AR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    document.getElementById("header-sync").textContent = `Actualizado: ${now}`;
  } catch(e) {
    document.getElementById("main-content").innerHTML = `
      <div class="error-state">
        <strong>No se pudo cargar la información.</strong><br><br>
        Verificá que la hoja de Google Sheets esté publicada:<br>
        <em>Archivo → Compartir → Publicar en la web → Todo el documento → Publicar</em><br><br>
        También verificá que los nombres de las pestañas sean exactamente:<br>
        <code>config, subsuelo, pb, entre, p1, p2, p3, p4, p5, p6, p7, p8, p9, terraza</code><br><br>
        <span style="font-size:11px;color:#999">Error: ${e.message}</span>
      </div>`;
    document.getElementById("header-sync").textContent = "Error al cargar";
  }
}

buildNav();
loadAndRender();
</script>
</body>
</html>
