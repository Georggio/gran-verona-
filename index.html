<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gran Verona · Avance de Obra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root {
  --bg:        #0d0d0d;
  --bg2:       #141414;
  --bg3:       #1c1c1c;
  --border:    #2a2a2a;
  --green:     #5cdb6e;
  --green-dim: rgba(92,219,110,0.12);
  --text:      #e8e8e8;
  --muted:     #777;
  --dim:       #aaa;
  --orange:    #f0933a;
  --blue:      #4a9eff;
  --gray-s:    #555;
  --r:         10px;
  --shadow:    0 2px 16px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;min-height:100vh}

/* ── LOGIN ──────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-logo{width:140px;margin-bottom:32px;opacity:.95}
.login-box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px 28px;width:100%;max-width:340px;box-shadow:var(--shadow)}
.login-box h2{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.04em;text-align:center;margin-bottom:6px}
.login-box p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:24px}
.login-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;letter-spacing:.1em;text-align:center;outline:none;transition:border-color .2s;margin-bottom:14px}
.login-input:focus{border-color:var(--green)}
.login-input.shake{animation:shake .4s ease;border-color:#e05252}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
.login-btn{width:100%;background:var(--green);color:#0d0d0d;border:none;border-radius:8px;padding:12px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.88}
.login-error{color:#e05252;font-size:12px;text-align:center;margin-top:10px;min-height:16px}

/* ── APP ─────────────────────────────────── */
#app{display:none}

/* Header */
.header{background:#000;border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:14px;height:58px;position:sticky;top:0;z-index:100}
.header-logo{height:34px}
.header-divider{width:1px;height:28px;background:var(--border)}
.header-info{flex:1}
.header-label{font-size:10px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;letter-spacing:.04em;line-height:1.1}
.floor-badge{background:var(--green-dim);border:1px solid var(--green);color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;padding:4px 10px;border-radius:20px;white-space:nowrap}

/* Hero piso */
.floor-hero{padding:0 16px;border-bottom:1px solid var(--border)}
.floor-hero-inner{display:flex;align-items:center;gap:16px;padding:16px 0}
.floor-hero-icon{width:64px;height:64px;border-radius:14px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:30px;flex-shrink:0;color:var(--green)}
.floor-hero-text{flex:1}
.floor-hero-name{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:.02em;line-height:1}
.floor-hero-sub{font-size:13px;color:var(--muted);margin-top:3px}
.floor-hero-counter{text-align:right;flex-shrink:0}
.floor-hero-num{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--green);line-height:1}
.floor-hero-num-label{font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-top:2px}

/* Legend */
.legend{display:flex;gap:12px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg2)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%}

/* Loading */
.state-box{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;gap:12px;color:var(--muted);font-size:13px;text-align:center}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Section label */
.section-label{padding:14px 16px 8px;font-size:10px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-weight:600}

/* ── AREAS GRID 2 columnas ── */
.areas-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px}

.area-card-grid{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 12px 12px;cursor:pointer;
  transition:border-color .2s,background .2s;
  display:flex;flex-direction:column;
}
.area-card-grid:hover{border-color:#3a3a3a;background:#181818}
.area-card-grid-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px;flex-shrink:0}
.area-card-grid-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:.03em;line-height:1.15;margin-bottom:3px}
.area-card-grid-meta{font-size:11px;color:var(--muted);margin-bottom:10px}
.mini-bar-track{background:var(--bg3);border-radius:3px;height:3px;overflow:hidden;margin-bottom:10px}
.mini-bar-fill{height:100%;border-radius:3px;background:var(--green)}
.preview-rubros{display:flex;flex-direction:column;gap:5px}
.preview-rubro-row{display:flex;align-items:center;gap:6px}
.preview-rubro-name{font-size:11px;color:var(--dim);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.preview-dots{display:flex;gap:3px;flex-shrink:0}
.pdot{width:8px;height:8px;border-radius:2px}

/* ── DETALLE ── */
#detail-view{display:none;flex-direction:column}
.detail-back{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;color:var(--muted);font-size:13px;border-bottom:1px solid var(--border);background:var(--bg2);transition:color .2s}
.detail-back:hover{color:var(--text)}
.detail-back i{font-size:18px}
.detail-header{display:flex;align-items:center;gap:12px;padding:16px 16px 14px;border-bottom:1px solid var(--border)}
.detail-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.detail-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;letter-spacing:.03em;line-height:1.1}
.detail-meta{font-size:11px;color:var(--muted);margin-top:3px}
.detail-progress-wrap{padding:12px 16px;border-bottom:1px solid var(--border)}
.detail-bar-track{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden}
.detail-bar-fill{height:100%;border-radius:4px;background:var(--green);transition:width .6s ease}
.detail-progress-label{font-size:11px;color:var(--muted);margin-top:5px}

/* Rubros en detalle */
.rubros-list{display:flex;flex-direction:column}
.rubro-block{border-top:1px solid var(--border)}
.rubro-header{display:flex;align-items:center;gap:10px;padding:12px 16px 8px}
.rubro-icon-wrap{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px}
.rubro-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:.04em;flex:1}
.items-list{padding:0 16px 12px 58px;display:flex;flex-direction:column;gap:6px}
.item-row{display:flex;align-items:flex-start;gap:8px}
.item-name{font-size:12px;color:var(--dim);flex:1;line-height:1.4}
.status-pill{display:flex;align-items:center;gap:4px;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;flex-shrink:0}
.status-pill .dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.s0{background:rgba(85,85,85,.2);color:var(--gray-s)}.s0 .dot{background:var(--gray-s)}
.s1{background:rgba(240,147,58,.15);color:var(--orange)}.s1 .dot{background:var(--orange)}
.s2{background:rgba(74,158,255,.15);color:var(--blue)}.s2 .dot{background:var(--blue)}
.s3{background:rgba(92,219,110,.15);color:var(--green)}.s3 .dot{background:var(--green)}
.obs-block{margin:4px 16px 12px 58px;background:rgba(240,147,58,.08);border-left:3px solid var(--orange);border-radius:0 6px 6px 0;padding:8px 10px}
.obs-label{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--orange);text-transform:uppercase;margin-bottom:3px}
.obs-text{font-size:12px;color:var(--dim);line-height:1.5}
.bottom-spacer{height:32px}
</style>
</head>

  'vidrios':                  { icon:'ti-square',           color:'#90d0e8', bg:'rgba(144,208,232,0.15)' },
  'pluviales':                { icon:'ti-cloud-rain',       color:'#70a8d8', bg:'rgba(112,168,216,0.15)' },
  'incendio':                 { icon:'ti-flame',            color:'#e05050', bg:'rgba(224,80,80,0.15)'   },
  'default':                  { icon:'ti-category',         color:'#888888', bg:'rgba(136,136,136,0.12)' },
};

const STATUS_LABELS = ['Por comenzar','En ejecución','Finalizado parcialmente','Finalizado y aprobado'];
const DOT_COLORS    = ['#555','#f0933a','#4a9eff','#5cdb6e'];
const HEADER_KW     = ['área','area','rubro','item','ítem','estado','observ','espacio'];

/* ═══════════════════════════════════════
   UTILS
═══════════════════════════════════════ */
function norm(s){
  return (s||'').toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,'').trim();
}
function isHeaderRow(row){
  const j=norm(row.join(' '));
  return HEADER_KW.some(k=>j===k||j.startsWith(k+' '));
}
function getAreaStyle(name){
  const key=norm(name);
  if(AREA_ICONS[key]) return AREA_ICONS[key];
  for(const k in AREA_ICONS){
    if(k==='default') continue;
    if(key.includes(k)) return AREA_ICONS[k];
  }
  return AREA_ICONS['default'];
}
function getRubroStyle(name){
  const key=norm(name);
  if(RUBRO_ICONS[key]) return RUBRO_ICONS[key];
  for(const k in RUBRO_ICONS){
    if(k==='default') continue;
    if(key.includes(k)||k.includes(key)) return RUBRO_ICONS[k];
  }
  return RUBRO_ICONS['default'];
}
function calcStats(rubros){
  let total=0,done=0,aprobados=0;
  for(const r of rubros) for(const it of r.items){
    total++; done+=it.status; if(it.status===3) aprobados++;
  }
  return {total,aprobados,pct:total===0?0:Math.round((done/(total*3))*100)};
}

/* ═══════════════════════════════════════
   AUTH
═══════════════════════════════════════ */
function checkAuth(){ return sessionStorage.getItem('gv_auth')==='1'; }
document.getElementById('login-btn').addEventListener('click',tryLogin);
document.getElementById('pw-input').addEventListener('keydown',e=>{ if(e.key==='Enter') tryLogin(); });
function tryLogin(){
  const val=document.getElementById('pw-input').value.trim().toLowerCase();
  if(val===PASSWORD){
    sessionStorage.setItem('gv_auth','1');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    initApp();
  } else {
    const inp=document.getElementById('pw-input');
    const err=document.getElementById('login-error');
    inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
    err.textContent='Clave incorrecta. Intentá nuevamente.'; inp.value='';
    setTimeout(()=>{ inp.classList.remove('shake'); err.textContent=''; },2000);
  }
}

/* ═══════════════════════════════════════
   FLOOR + INIT
═══════════════════════════════════════ */
function getFloorId(){
  const p=new URLSearchParams(window.location.search).get('piso')||'p1';
  return FLOORS[p]?p:'p1';
}
let currentFloorId='';
let allAreas=[];

function initApp(){
  currentFloorId=getFloorId();
  const floor=FLOORS[currentFloorId];
  document.getElementById('floor-badge').textContent=floor.name;
  document.getElementById('floor-name').textContent=floor.name;
  document.getElementById('floor-sub').textContent=floor.sub;
  document.getElementById('hero-icon').innerHTML=`<i class="ti ${floor.icon}"></i>`;
  loadSheet(currentFloorId);
}

/* ═══════════════════════════════════════
   DATA
═══════════════════════════════════════ */
async function loadSheet(floorId){
  const gc=document.getElementById('grid-content');
  gc.innerHTML='<div class="state-box"><div class="spinner"></div><span>Conectando con Google Sheets…</span></div>';
  const sn=encodeURIComponent(floorId);
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${sn}`);
    if(r.ok){ const t=await r.text(); if(t&&t.length>10&&!t.startsWith('<!')){ processData(parseCSV(t)); return; } }
  }catch(e){}
  try{
    const gid=await getGid(floorId);
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${sn}${gid?'&gid='+gid:''}`);
    if(r.ok){ const t=await r.text(); if(t&&t.length>10){ processData(parseCSV(t)); return; } }
  }catch(e){}
  gc.innerHTML='<div class="state-box"><i class="ti ti-wifi-off" style="font-size:32px;color:#555"></i><span>No se pudo conectar.<br>Verificá que la hoja esté publicada.</span></div>';
}

async function getGid(name){
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit`);
    const t=await r.text();
    const m=t.match(new RegExp(`"${name}"[^}]*"sheetId":(\\d+)`));
    return m?m[1]:null;
  }catch(e){ return null; }
}

function parseCSV(text){
  const rows=[];
  for(const line of text.split('\n')){
    const row=[];let inQ=false,cur='';
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){row.push(cur.trim());cur='';}
      else{cur+=line[i];}
    }
    row.push(cur.trim());rows.push(row);
  }
  return rows;
}

/* ═══════════════════════════════════════
   PARSE
═══════════════════════════════════════ */
function parseRows(rows){
  let start=-1;
  for(let i=0;i<rows.length;i++){
    if(isHeaderRow(rows[i])){ start=i+1; break; }
  }
  if(start===-1){
    for(let i=0;i<rows.length;i++){
      if(rows[i].filter(c=>c.trim().length>0).length>=3){ start=i; break; }
    }
  }
  if(start===-1) return [];

  let off=0;
  for(let i=start;i<Math.min(start+5,rows.length);i++){
    for(let c=0;c<rows[i].length;c++){
      if(rows[i][c].trim().length>0){ off=c; break; }
    }
    if(off>0) break;
  }

  const areas={},areaOrder=[],rubroOrder={};
  let lastA='',lastR='';

  for(let i=start;i<rows.length;i++){
    const row=rows[i];
    if(!row||row.length<off+3) continue;
    const area  =(row[off]  ||'').trim();
    const rubro =(row[off+1]||'').trim();
    const item  =(row[off+2]||'').trim();
    const estado=(row[off+3]||'').trim();
    const obs   =(row[off+4]||'').trim();

    if(!item) continue;
    if(isHeaderRow([area,rubro,item,estado])) continue;

    if(area)  lastA=area;
    if(rubro) lastR=rubro;
    const a=lastA||'(Sin área)';
    const r=lastR||'(Sin rubro)';

    // Saltar filas que son la fila-cabecera "Área / Espacio"
    const aN=norm(a);
    if(aN==='area'||aN==='area espacio'||aN==='espacio') continue;

    if(!areas[a]){ areas[a]={rubros:{}}; areaOrder.push(a); }
    if(!areas[a].rubros[r]){
      areas[a].rubros[r]={items:[]};
      if(!rubroOrder[a]) rubroOrder[a]=[];
      rubroOrder[a].push(r);
    }
    areas[a].rubros[r].items.push({name:item,status:parseStatus(estado),obs});
  }

  return areaOrder.map(a=>({
    name:a,
    rubros:(rubroOrder[a]||[]).map(r=>({name:r,items:areas[a].rubros[r].items}))
  }));
}

function parseStatus(s){
  s=norm(s);
  if(!s||s==='0'||s.includes('comen')||s.includes('por')) return 0;
  if(s==='1'||s.includes('ejecuc')||s.includes('proceso')) return 1;
  if(s==='2'||s.includes('parcial')) return 2;
  if(s==='3'||s.includes('finaliz')||s.includes('aprobad')) return 3;
  return 0;
}
function getStatusClass(s){ return ['s0','s1','s2','s3'][s]||'s0'; }

/* ═══════════════════════════════════════
   PROCESS
═══════════════════════════════════════ */
function processData(rows){
  allAreas=parseRows(rows);
  if(!allAreas.length){
    document.getElementById('grid-content').innerHTML='<div class="state-box"><i class="ti ti-database-off" style="font-size:32px;color:#555"></i><span>Sin datos en esta hoja.</span></div>';
    return;
  }
  updateHeroCounter();
  renderGrid();
}

function updateHeroCounter(){
  let aprobados=0,total=0;
  for(const a of allAreas) for(const r of a.rubros) for(const it of r.items){
    total++; if(it.status===3) aprobados++;
  }
  document.getElementById('hero-counter').textContent=`${aprobados}/${total}`;
}

/* ═══════════════════════════════════════
   RENDER GRID
═══════════════════════════════════════ */
function isDepto(name){
  const n=norm(name);
  // Empieza con "depto" o "departamento", o es solo una letra (A, B, C…)
  return n.startsWith('depto')||n.startsWith('departamento')||/^[a-g]$/.test(n);
}

function renderGrid(){
  showView('grid');
  const gc=document.getElementById('grid-content');
  gc.innerHTML='';

  const deptos=allAreas.filter(a=>isDepto(a.name));
  const otros =allAreas.filter(a=>!isDepto(a.name));

  if(deptos.length>0){
    gc.appendChild(makeLabel('Departamentos'));
    gc.appendChild(makeGrid(deptos));
  }
  if(otros.length>0){
    if(deptos.length>0) gc.appendChild(makeLabel('Otros espacios'));
    gc.appendChild(makeGrid(otros));
  }
  const sp=document.createElement('div');sp.className='bottom-spacer';gc.appendChild(sp);
}

function makeLabel(txt){
  const el=document.createElement('div');el.className='section-label';el.textContent=txt;return el;
}

function makeGrid(areas){
  const g=document.createElement('div');g.className='areas-grid';
  for(const a of areas) g.appendChild(makeAreaCard(a));
  return g;
}

function makeAreaCard(area){
  const style=getAreaStyle(area.name);
  const {pct}=calcStats(area.rubros);
  const preview=area.rubros.slice(0,3);

  const card=document.createElement('div');
  card.className='area-card-grid';
  card.innerHTML=`
    <div class="area-card-grid-icon" style="background:${style.bg};color:${style.color}">
      <i class="ti ${style.icon}"></i>
    </div>
    <div class="area-card-grid-name">${area.name}</div>
    <div class="area-card-grid-meta">${area.rubros.length} rubros</div>
    <div class="mini-bar-track"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
    <div class="preview-rubros">
      ${preview.map(r=>`
        <div class="preview-rubro-row">
          <div class="preview-rubro-name">${r.name}</div>
          <div class="preview-dots">
            ${r.items.slice(0,4).map(it=>`<div class="pdot" style="background:${DOT_COLORS[it.status]}"></div>`).join('')}
          </div>
        </div>`).join('')}
    </div>
  `;
  card.addEventListener('click',()=>openDetail(area));
  return card;
}

/* ═══════════════════════════════════════
   DETALLE
═══════════════════════════════════════ */
function openDetail(area){
  const style=getAreaStyle(area.name);
  const {pct}=calcStats(area.rubros);
  const totalItems=area.rubros.reduce((s,r)=>s+r.items.length,0);

  document.getElementById('detail-icon').style.cssText=`background:${style.bg};color:${style.color}`;
  document.getElementById('detail-icon').innerHTML=`<i class="ti ${style.icon}"></i>`;
  document.getElementById('detail-name').textContent=area.name;
  document.getElementById('detail-meta').textContent=`${area.rubros.length} rubros · ${totalItems} ítems`;
  document.getElementById('detail-bar').style.width=`${pct}%`;
  document.getElementById('detail-progress-label').textContent=`${pct}% de avance global`;
  document.getElementById('detail-back-label').textContent=FLOORS[currentFloorId].name;

  const container=document.getElementById('detail-rubros');
  container.innerHTML='';

  for(const rubro of area.rubros){
    const rs=getRubroStyle(rubro.name);
    const block=document.createElement('div');
    block.className='rubro-block';

    const rh=document.createElement('div');
    rh.className='rubro-header';
    rh.innerHTML=`
      <div class="rubro-icon-wrap" style="background:${rs.bg};color:${rs.color}">
        <i class="ti ${rs.icon}"></i>
      </div>
      <div class="rubro-name" style="color:${rs.color}">${rubro.name}</div>
    `;

    const itemsEl=document.createElement('div');
    itemsEl.className='items-list';
    let blockObs='';

    for(const item of rubro.items){
      const row=document.createElement('div');
      row.className='item-row';
      row.innerHTML=`
        <div class="item-name">${item.name}</div>
        <div class="status-pill ${getStatusClass(item.status)}">
          <div class="dot"></div>${STATUS_LABELS[item.status]}
        </div>
      `;
      itemsEl.appendChild(row);
      if(item.obs&&item.obs.trim()) blockObs=item.obs.trim();
    }

    block.appendChild(rh);
    block.appendChild(itemsEl);

    if(blockObs){
      const obs=document.createElement('div');
      obs.className='obs-block';
      obs.innerHTML=`<div class="obs-label">Observación</div><div class="obs-text">${blockObs}</div>`;
      block.appendChild(obs);
    }
    container.appendChild(block);
  }

  showView('detail');
}

document.getElementById('detail-back-btn').addEventListener('click',()=>showView('grid'));

/* ═══════════════════════════════════════
   SWITCH VIEW
═══════════════════════════════════════ */
function showView(v){
  document.getElementById('grid-view').style.display  =v==='grid'  ?'block':'none';
  document.getElementById('detail-view').style.display=v==='detail'?'flex' :'none';
  window.scrollTo(0,0);
}

/* ═══════════════════════════════════════
   BOOT
═══════════════════════════════════════ */
if(checkAuth()){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  initApp();
}
</script>
