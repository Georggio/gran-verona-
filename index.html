<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Edificio Gran Verona — Avance de Obra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0ede6;
    --muted: #888;
    --green-brand: #4CAF50;
    --cream: #f0ede6;

    /* Estados */
    --state0-bg: #1e1e1e;
    --state0-color: #666;
    --state0-border: #333;
    --state1-bg: #1a1500;
    --state1-color: #f0a500;
    --state1-border: #3d2e00;
    --state2-bg: #001830;
    --state2-color: #3ea6ff;
    --state2-border: #003060;
    --state3-bg: #001a0a;
    --state3-color: #4CAF50;
    --state3-border: #1a4a25;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* HEADER */
  .header {
    background: var(--dark);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-img {
    height: 36px;
    width: auto;
    filter: brightness(1.1);
  }
  .header-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
  }
  .header-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--cream);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .floor-badge {
    background: var(--green-brand);
    color: #000;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* LOADING */
  .loading-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 70px);
    gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--green-brand);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); }

  /* ERROR */
  .error-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: calc(100vh - 70px);
    gap: 12px;
    padding: 24px;
    text-align: center;
  }
  .error-icon { font-size: 36px; }
  .error-title { font-size: 16px; font-weight: 600; color: #ff6b6b; }
  .error-msg { font-size: 13px; color: var(--muted); line-height: 1.6; }

  /* MAIN CONTENT */
  .content { display: none; padding: 20px 16px 32px; max-width: 600px; margin: 0 auto; }

  /* NIVEL HERO */
  .nivel-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .nivel-icon {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #1a2a1a, #0d1f0d);
    border: 1px solid var(--state3-border);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }
  .nivel-info h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.2;
  }
  .nivel-info p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .nivel-stats {
    margin-left: auto;
    text-align: right;
    flex-shrink: 0;
  }
  .stat-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--green-brand);
    line-height: 1;
  }
  .stat-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* LEYENDA */
  .legend {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .legend-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
  }

  /* SECTION */
  .section-title {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--muted);
    margin-bottom: 10px;
    padding-left: 2px;
  }

  /* AREA CARD */
  .area-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }
  .area-grid.single { grid-template-columns: 1fr; }
  
  .area-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .area-card:active { transform: scale(0.98); }
  .area-card:hover { border-color: #444; }
  
  .area-card-header {
    padding: 14px 14px 10px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .area-icon {
    font-size: 20px;
    line-height: 1;
    flex-shrink: 0;
  }
  .area-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--cream);
    line-height: 1.3;
  }
  .area-sub {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }
  
  .area-progress-bar {
    margin: 0 14px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .area-progress-fill {
    height: 100%;
    background: var(--green-brand);
    border-radius: 2px;
    transition: width 0.6s ease;
  }
  
  .area-rubros {
    padding: 10px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .rubro-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .rubro-label {
    font-size: 10px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100px;
  }
  .rubro-dots {
    display: flex;
    gap: 3px;
    flex-shrink: 0;
  }
  .rubro-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-overlay.open { display: flex; align-items: flex-end; }
  .modal-box {
    background: var(--dark);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    padding: 0 0 40px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
  
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .modal-header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-icon { font-size: 24px; }
  .modal-title { font-size: 17px; font-weight: 600; color: var(--cream); }
  .modal-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .modal-close {
    margin-left: auto;
    width: 32px; height: 32px;
    background: var(--border);
    border: none;
    border-radius: 50%;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  
  .modal-body { padding: 16px 20px; }
  
  .rubro-section { margin-bottom: 20px; }
  .rubro-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rubro-title-icon { font-size: 14px; }
  
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid #1e1e1e;
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { font-size: 13px; color: var(--text); flex: 1; line-height: 1.4; }
  .item-state {
    font-size: 10px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    letter-spacing: 0.03em;
    border: 1px solid;
    flex-shrink: 0;
  }
  .s0 { background: var(--state0-bg); color: var(--state0-color); border-color: var(--state0-border); }
  .s1 { background: var(--state1-bg); color: var(--state1-color); border-color: var(--state1-border); }
  .s2 { background: var(--state2-bg); color: var(--state2-color); border-color: var(--state2-border); }
  .s3 { background: var(--state3-bg); color: var(--state3-color); border-color: var(--state3-border); }
  
  .obs-text {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
    font-style: italic;
    display: block;
  }

  /* RESPONSIVE */
  @media(max-width: 380px) {
    .area-grid { grid-template-columns: 1fr; }
    .nivel-info h1 { font-size: 17px; }
  }
</style>
</head>

function getRubroIcon(name) {
  for (const [key, icon] of Object.entries(RUBRO_ICONS)) {
    if (name && name.toLowerCase().includes(key.toLowerCase())) return icon;
  }
  return RUBRO_ICONS.default;
}

function getAreaIcon(name) {
  for (const [key, icon] of Object.entries(AREA_ICONS)) {
    if (name && name.toLowerCase().includes(key.toLowerCase())) return icon;
  }
  return AREA_ICONS.default;
}

function getFloorFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('piso') || 'p1';
}

async function loadSheetCSV(sheetName) {
  // Try multiple methods for fetching Google Sheets data
  const encodedName = encodeURIComponent(sheetName);
  
  // Method 1: gviz query API (most reliable for public sheets)
  const urls = [
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodedName}`,
    `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodedName}`
  ];
  
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 10) return parseCSV(text);
      }
    } catch(e) {
      console.warn('Fetch failed:', url, e);
    }
  }
  throw new Error(`No se pudo cargar la pestaña: ${sheetName}`);
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  return lines.map(line => {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        inQuotes = !inQuotes;
      } else if (c === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += c;
      }
    }
    result.push(current.trim());
    return result;
  });
}

// Parse config sheet: col A = rubro, col B = item
function parseConfig(rows) {
  const rubros = {};
  let currentRubro = null;
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const rubroCell = (row[0] || '').trim();
    const itemCell = (row[1] || '').trim();
    if (rubroCell) currentRubro = rubroCell;
    if (currentRubro && itemCell) {
      if (!rubros[currentRubro]) rubros[currentRubro] = [];
      rubros[currentRubro].push(itemCell);
    }
  }
  return rubros;
}

// Parse floor sheet: col A = area, col B = rubro, col C = item, col D = estado, col E = obs
// Handles: decorative title rows, merged cells (area/rubro propagated downward)
function parseFloor(rows) {
  const areas = {};

  // Find the actual data start: look for the row that has "Estado" or "Área" in any cell
  // Data rows are those where col C (item) is non-empty
  // Skip decorative rows (title, instructions, headers)
  const STATE_KEYWORDS = ['comenzar', 'ejecuci', 'parcial', 'finalizado', 'aprobado'];
  function isStateValue(v) {
    const lv = (v||'').toLowerCase();
    return STATE_KEYWORDS.some(k => lv.includes(k)) || /^[0-3]$/.test(v.trim());
  }

  // Find first data row: has a state value in col D (index 3)
  let dataStart = -1;
  for (let i = 0; i < rows.length; i++) {
    if (isStateValue(rows[i][4] || '')) { dataStart = i; break; }
  }
  if (dataStart === -1) return areas; // no data found

  let currentArea = '';
  let currentRubro = '';

  for (let i = dataStart; i < rows.length; i++) {
    const row = rows[i];
    // Data is offset: col A is empty, real data starts at col B (index 1)
    const areaCell = (row[1] || '').trim();
    const rubroCell = (row[2] || '').trim();
    const item = (row[3] || '').trim();
    const estadoRaw = (row[4] || '').trim();
    const obs = (row[5] || '').trim();

    // Propagate area and rubro downward (merged cells come as empty)
    if (areaCell) currentArea = areaCell;
    if (rubroCell) currentRubro = rubroCell;

    const area = currentArea;
    const rubro = currentRubro;
    if (!area || !item) continue;
    
    // Parse estado — matches exact dropdown values from the sheet
    let estado = 0;
    const el = estadoRaw.toLowerCase();
    if (el === '3' || (el.includes('finalizado') && el.includes('aprobado'))) estado = 3;
    else if (el === '2' || el.includes('parcial')) estado = 2;
    else if (el === '1' || el.includes('ejecuci')) estado = 1;
    else estado = 0;
    
    if (!areas[area]) areas[area] = {};
    if (!areas[area][rubro]) areas[area][rubro] = [];
    areas[area][rubro].push({ item, estado, obs });
  }
  return areas;
}

function calcAreaProgress(rubros) {
  let total = 0, done = 0;
  for (const items of Object.values(rubros)) {
    for (const it of items) {
      total++;
      if (it.estado === 3) done++;
    }
  }
  return total > 0 ? Math.round((done / total) * 100) : 0;
}

let allData = null;

  document.getElementById('floorBadge').textContent = floorCfg.name;
  document.getElementById('nivelIcon').textContent = floorCfg.icon;
  document.getElementById('nivelTitle').textContent = floorCfg.name;
  document.getElementById('nivelDesc').textContent = floorCfg.desc || 'Edificio Gran Verona';
  
  try {
    const floorRows = await loadSheetCSV(floorId);
    const areas = parseFloor(floorRows);
    allData = areas;

    renderAreas(areas, floorCfg);
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
  } catch(err) {
    console.error(err);
    document.getElementById('loadingScreen').style.display = 'none';
    const es = document.getElementById('errorScreen');
    es.style.display = 'flex';
    document.getElementById('errorMsg').textContent = err.message || 'Error al conectar con Google Sheets.';
  }
}

function renderAreas(areas, floorCfg) {
  const container = document.getElementById('areasContainer');
  container.innerHTML = '';
  
  const areaNames = Object.keys(areas);
  if (areaNames.length === 0) {
    container.innerHTML = '<p style="color:var(--muted);text-align:center;padding:40px 0">Sin datos en esta hoja.</p>';
    return;
  }
  
  // Split into deptos and common areas
  const deptos = areaNames.filter(a => a.toLowerCase().includes('depto') || a.toLowerCase().includes('departamento'));
  const comunes = areaNames.filter(a => !deptos.includes(a));
  
  let totalFinalized = 0, totalItems = 0;
  for (const area of areaNames) {
    for (const items of Object.values(areas[area])) {
      for (const it of items) {
        totalItems++;
        if (it.estado === 3) totalFinalized++;
      }
    }
  }
  document.getElementById('statFinalized').textContent = `${totalFinalized}/${totalItems}`;
  
  if (deptos.length > 0) {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">Departamentos</div>`;
    const grid = document.createElement('div');
    grid.className = 'area-grid';
    for (const area of deptos) {
      grid.appendChild(buildAreaCard(area, areas[area]));
    }
    sec.appendChild(grid);
    container.appendChild(sec);
  }
  
  if (comunes.length > 0) {
    const sec = document.createElement('div');
    sec.innerHTML = `<div class="section-title">Áreas Comunes</div>`;
    const grid = document.createElement('div');
    grid.className = `area-grid${comunes.length === 1 ? ' single' : ''}`;
    for (const area of comunes) {
      grid.appendChild(buildAreaCard(area, areas[area]));
    }
    sec.appendChild(grid);
    container.appendChild(sec);
  }
}

function buildAreaCard(areaName, rubros) {
  const card = document.createElement('div');
  card.className = 'area-card';
  card.onclick = () => openModal(areaName, rubros);
  
  const progress = calcAreaProgress(rubros);
  const icon = getAreaIcon(areaName);
  
  // Get up to 3 rubros to preview
  const rubroNames = Object.keys(rubros).slice(0, 3);
  
  const dotsHtml = rubroNames.map(rName => {
    const items = rubros[rName];
    const dotsInner = items.slice(0, 4).map(it => {
      const colors = ['#555', '#f0a500', '#3ea6ff', '#4CAF50'];
      return `<div class="rubro-dot" style="background:${colors[it.estado]}"></div>`;
    }).join('');
    return `<div class="rubro-row">
      <span class="rubro-label">${rName}</span>
      <div class="rubro-dots">${dotsInner}</div>
    </div>`;
  }).join('');
  
  card.innerHTML = `
    <div class="area-card-header">
      <div class="area-icon">${icon}</div>
      <div>
        <div class="area-name">${areaName}</div>
        <div class="area-sub">${Object.keys(rubros).length} rubros</div>
      </div>
    </div>
    <div class="area-progress-bar">
      <div class="area-progress-fill" style="width:${progress}%"></div>
    </div>
    <div class="area-rubros">${dotsHtml}</div>
  `;
  return card;
}

function openModal(areaName, rubros) {
  const icon = getAreaIcon(areaName);
  document.getElementById('modalIcon').textContent = icon;
  document.getElementById('modalTitle').textContent = areaName;
  
  const rubroNames = Object.keys(rubros);
  const totalItems = rubroNames.reduce((s, r) => s + rubros[r].length, 0);
  document.getElementById('modalSub').textContent = `${rubroNames.length} rubros · ${totalItems} ítems`;
  
  const body = document.getElementById('modalBody');
  body.innerHTML = '';
  
  for (const rName of rubroNames) {
    const sec = document.createElement('div');
    sec.className = 'rubro-section';
    const rIcon = getRubroIcon(rName);
    sec.innerHTML = `<div class="rubro-title"><span class="rubro-title-icon">${rIcon}</span>${rName}</div>`;
    
    for (const it of rubros[rName]) {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `
        <div>
          <div class="item-name">${it.item}</div>
          ${it.obs ? `<span class="obs-text">${it.obs}</span>` : ''}
        </div>
        <div class="item-state s${it.estado}">${STATE_LABELS[it.estado]}</div>
      `;
      sec.appendChild(row);
    }
    body.appendChild(sec);
  }
  
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalIfOverlay(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

init();
</script>
</body>
</html>
